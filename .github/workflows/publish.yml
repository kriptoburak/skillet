name: Publish to npm

# Publishes when you push a version tag, e.g.  git tag v0.1.0 && git push --tags
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm test
      - name: Publish (skips gracefully when NPM_TOKEN is not configured)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::notice::NPM_TOKEN secret not set — skipping npm publish (version may have been published manually)"
            exit 0
          fi
          npm publish --provenance --access public
